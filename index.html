<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Cellular Automata | Living Texture</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="nca-canvas"></canvas>
      <div class="scene-noise" aria-hidden="true"></div>

      <aside class="overlay" id="control-overlay" aria-expanded="true">
        <div class="header">
          <div class="header-row">
            <p class="eyebrow">Neural Cellular Automata</p>
            <button
              id="menu-toggle-btn"
              class="menu-toggle"
              type="button"
              aria-controls="overlay-body"
              aria-expanded="true"
            >
              Minimize
            </button>
          </div>
          <h1>Living Texture Lab</h1>
          <p class="subtitle">
            Evolving pixel colonies with real-time mutation, light bloom, and palette morphing.
          </p>
        </div>

        <div class="overlay-body" id="overlay-body">
          <div class="status-bar">
            <div class="status-chip">FPS <span id="fps-val">--</span></div>
            <div class="status-chip" id="state-val">Running</div>
            <div class="status-chip">Brush <span id="brush-mode-val">Bloom</span></div>
          </div>

          <div class="controls">
            <div class="control-group">
              <label for="speed">Speed <span id="speed-val">10</span>x</label>
              <input type="range" id="speed" min="1" max="36" value="10" />
            </div>
            <div class="control-group">
              <label for="mutation">Mutation <span id="mutation-val">0.50</span></label>
              <input type="range" id="mutation" min="0" max="1" step="0.01" value="0.5" />
            </div>
            <div class="control-group">
              <label for="brush">Brush <span id="brush-val">42</span>px</label>
              <input type="range" id="brush" min="12" max="140" step="1" value="42" />
            </div>
            <div class="control-group">
              <label for="bloom">Bloom <span id="bloom-val">0.80</span></label>
              <input type="range" id="bloom" min="0" max="1.8" step="0.01" value="0.8" />
            </div>
            <div class="control-group">
              <label for="flow">Flow <span id="flow-val">0.08</span></label>
              <input type="range" id="flow" min="0" max="1.4" step="0.01" value="0.08" />
            </div>
            <div class="control-group control-select">
              <label for="palette">Palette</label>
              <select id="palette">
                <option value="0" selected>Bioluminescent</option>
                <option value="1">Solar Flare</option>
                <option value="2">Aurora</option>
                <option value="3">Cyber Moss</option>
                <option value="4">Ember Rift</option>
              </select>
            </div>
            <div class="control-group control-select">
              <label for="design">Design</label>
              <select id="design">
                <option value="0" selected>Original Halo</option>
                <option value="1">Hex Bloom</option>
                <option value="2">Spiral Orbit</option>
                <option value="3">Mirror Lattice</option>
              </select>
            </div>
          </div>

          <div class="buttons">
            <button id="pause-btn" type="button">Pause</button>
            <button id="reset-btn" type="button">Reset</button>
            <button id="seed-btn" type="button">New Seed</button>
          </div>

          <p class="hint">
            Left-drag blooms new growth. Right-drag carves a crater with a regrowth ring. Keyboard:
            <kbd>Space</kbd> pause, <kbd>R</kbd> reset, <kbd>N</kbd> new seed, <kbd>M</kbd> menu.
          </p>
        </div>
      </aside>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
